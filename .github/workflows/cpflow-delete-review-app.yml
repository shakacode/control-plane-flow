name: Delete Review App

on:
  workflow_call:
    inputs:
      control_plane_flow_ref:
        description: Git ref used to load shared cpflow composite actions.
        required: false
        type: string
        default: main

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: cpflow-delete-review-app-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  # Deletions must not cancel each other mid-flight — a cancelled `cpln` delete can leave
  # partial state behind. Let the in-progress deletion finish before the next run starts.
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}

jobs:
  delete-review-app:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(fromJson('["+review-app-delete","+review-app-delete\n","+review-app-delete\r\n"]'), github.event.comment.body) &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'closed') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: React to delete command
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: "eyes"
              });
            } catch (error) {
              if (error.status === 422) {
                core.info("Delete command reaction already exists.");
              } else {
                throw error;
              }
            }

      - name: Checkout control-plane-flow actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: shakacode/control-plane-flow
          ref: ${{ inputs.control_plane_flow_ref }}
          path: .cpflow
          persist-credentials: false

      - name: Validate required secrets and variables
        id: config
        uses: ./.cpflow/.github/actions/cpflow-validate-config
        env:
          CPLN_TOKEN_STAGING: ${{ secrets.CPLN_TOKEN_STAGING }}
        with:
          required: |
            secret:CPLN_TOKEN_STAGING
          pull_request_friendly: "true"

      - name: Checkout repository
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: app
          persist-credentials: false

      - name: Resolve review app config
        if: steps.config.outputs.ready == 'true'
        id: review-config
        working-directory: app
        env:
          CONFIGURED_CPLN_ORG_STAGING: ${{ vars.CPLN_ORG_STAGING }}
          CONFIGURED_REVIEW_APP_PREFIX: ${{ vars.REVIEW_APP_PREFIX }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
        shell: bash
        run: |
          set -euo pipefail

          ruby <<'RUBY' | tee -a "$GITHUB_OUTPUT" >> "$GITHUB_ENV"
          require "yaml"

          config = YAML.safe_load(File.read(".controlplane/controlplane.yml"), aliases: true)
          unless config.is_a?(Hash)
            warn "::error::.controlplane/controlplane.yml must be a YAML mapping; got #{config.class}: #{config.inspect}"
            exit 1
          end

          apps = config["apps"]
          unless apps.is_a?(Hash)
            warn "::error::.controlplane/controlplane.yml must define an apps mapping; got #{apps.class}: #{apps.inspect}"
            exit 1
          end

          review_apps = apps.select do |_name, app_config|
            app_config.is_a?(Hash) && app_config["match_if_app_name_starts_with"] == true
          end

          prefix = ENV.fetch("CONFIGURED_REVIEW_APP_PREFIX", "").strip
          if prefix.empty?
            if review_apps.length == 1
              prefix = review_apps.keys.first
            elsif review_apps.empty?
              warn "::error::Set REVIEW_APP_PREFIX or define exactly one app with match_if_app_name_starts_with: true in .controlplane/controlplane.yml."
              exit 1
            else
              warn "::error::Set REVIEW_APP_PREFIX because .controlplane/controlplane.yml defines multiple review app prefixes: #{review_apps.keys.sort.join(', ')}."
              exit 1
            end
          end

          app_config = apps[prefix]
          unless app_config.is_a?(Hash) && app_config["match_if_app_name_starts_with"] == true
            warn "::error::Review app prefix '#{prefix}' must match an app in .controlplane/controlplane.yml with match_if_app_name_starts_with: true."
            exit 1
          end

          cpln_org = ENV.fetch("CONFIGURED_CPLN_ORG_STAGING", "").strip
          cpln_org = app_config["cpln_org"].to_s.strip if cpln_org.empty?
          if cpln_org.empty?
            warn "::error::Set CPLN_ORG_STAGING or cpln_org for review app prefix '#{prefix}' in .controlplane/controlplane.yml."
            exit 1
          end

          app_name = "#{prefix}-#{ENV.fetch('PR_NUMBER')}"
          puts "REVIEW_APP_PREFIX=#{prefix}"
          puts "CPLN_ORG=#{cpln_org}"
          puts "APP_NAME=#{app_name}"
          puts "review_app_prefix=#{prefix}"
          puts "cpln_org=#{cpln_org}"
          puts "app_name=#{app_name}"
          RUBY

      - name: Setup environment
        if: steps.config.outputs.ready == 'true'
        uses: ./.cpflow/.github/actions/cpflow-setup-environment
        with:
          token: ${{ secrets.CPLN_TOKEN_STAGING }}
          org: ${{ steps.review-config.outputs.cpln_org }}
          working_directory: app
          cpln_cli_version: ${{ vars.CPLN_CLI_VERSION }}
          cpflow_version: ${{ vars.CPFLOW_VERSION }}
          control_plane_flow_ref: ${{ inputs.control_plane_flow_ref }}

      - name: Set workflow links
        if: steps.config.outputs.ready == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const workflowUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            core.exportVariable("WORKFLOW_URL", workflowUrl);
            core.exportVariable(
              "CONSOLE_URL",
              `https://console.cpln.io/console/org/${process.env.CPLN_ORG}/-info`
            );

      - name: Create initial PR comment
        if: steps.config.outputs.ready == 'true'
        id: create-comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const body = [
              "## 🗑️ Deleting review app...",
              "",
              `_Removing the review app for PR #${process.env.PR_NUMBER}_`
            ].join("\n");

            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body
            });
            core.setOutput("comment-id", comment.data.id);

      - name: Delete review app
        if: steps.config.outputs.ready == 'true'
        uses: ./.cpflow/.github/actions/cpflow-delete-control-plane-app
        with:
          app_name: ${{ steps.review-config.outputs.app_name }}
          cpln_org: ${{ steps.review-config.outputs.cpln_org }}
          review_app_prefix: ${{ steps.review-config.outputs.review_app_prefix }}
          working_directory: app

      # Finalizer still runs after delete failures, but only after config validation
      # created the initial PR comment and workflow link env vars it updates.
      - name: Finalize delete status
        if: always() && steps.config.outputs.ready == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          COMMENT_ID: ${{ steps.create-comment.outputs.comment-id }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const commentId = Number(process.env.COMMENT_ID);
            const success = process.env.JOB_STATUS === "success";
            const body = success
              ? [
                  "## ✅ Review App Deleted",
                  "",
                  `_Review app for PR #${process.env.PR_NUMBER} is deleted_`,
                  "",
                  `🎮 [Control Plane Console](${process.env.CONSOLE_URL})`,
                  `📋 [View Workflow Logs](${process.env.WORKFLOW_URL})`
                ].join("\n")
              : [
                  "## ❌ Failed to Delete Review App",
                  "",
                  `_Failed to delete review app for PR #${process.env.PR_NUMBER}_`,
                  "",
                  `🎮 [Control Plane Console](${process.env.CONSOLE_URL})`,
                  `📋 [View Workflow Logs](${process.env.WORKFLOW_URL})`
                ].join("\n");

            if (!Number.isFinite(commentId) || commentId <= 0) {
              core.warning("Skipping delete status comment update because no comment id was created.");
              return;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body
            });
