kind: workload
name: rails
spec:
  type: standard
  containers:
    - name: rails
      cpu: 300m
      inheritEnv: true
      image: "{{APP_IMAGE_LINK}}"
      memory: 512Mi
      ports:
        - number: 3000
          # Keep this as `http` even when fronting Rails with Thruster — the Control Plane
          # load balancer still serves HTTP/2 to end users. Setting `http2` here causes
          # `502 Bad Gateway` with "protocol error".
          # See https://www.shakacode.com/control-plane-flow/docs/thruster/ for details.
          protocol: http
      volumes:
        - path: /app/db
          recoveryPolicy: retain
          uri: cpln://volumeset/app-db
        - path: /app/storage
          recoveryPolicy: retain
          uri: cpln://volumeset/app-storage
  defaultOptions:
    autoscaling:
      minScale: 1
      maxScale: 1
    capacityAI: false
    timeoutSeconds: 60
  firewallConfig:
    external:
      inboundAllowCIDR:
        - 0.0.0.0/0
      outboundAllowCIDR:
        - 0.0.0.0/0
  # cpflow apply-template replaces {{APP_IDENTITY_LINK}} with the app workload identity link.
  identityLink: "{{APP_IDENTITY_LINK}}"
