kind: workload
name: rails
spec:
  type: standard
  containers:
    - name: rails
      cpu: 300m
      inheritEnv: true
      image: {{APP_IMAGE_LINK}}
      memory: 512Mi
      ports:
        - number: 3000
          protocol: http
      volumes:
        - path: /app/db
          recoveryPolicy: retain
          uri: cpln://volumeset/app-db
        - path: /app/storage
          recoveryPolicy: retain
          uri: cpln://volumeset/app-storage
  defaultOptions:
    autoscaling:
      minScale: 1
      maxScale: 1
    capacityAI: false
    timeoutSeconds: 60
  firewallConfig:
    external:
      inboundAllowCIDR:
        - 0.0.0.0/0
      outboundAllowCIDR:
        - 0.0.0.0/0
